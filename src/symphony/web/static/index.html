<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oh-my-symphony</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="board-name" id="board-name">Loading&hellip;</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a class="nav-item" data-route="board" href="#/board">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="1.5" y="2.5" width="3.4" height="11" rx="1"/><rect x="6.3" y="2.5" width="3.4" height="7" rx="1"/><rect x="11.1" y="2.5" width="3.4" height="9" rx="1"/></svg>
          <span class="nav-label">Board</span>
        </a>
        <a class="nav-item" data-route="stats" href="#/stats">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M2 13.5V9"/><path d="M6.2 13.5V5"/><path d="M10.4 13.5V7.5"/><path d="M14.6 13.5V2.5"/></svg>
          <span class="nav-label">Stats</span>
        </a>
        <a class="nav-item" data-route="workflow" href="#/workflow">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="4" cy="3.2" r="1.6"/><circle cx="4" cy="12.8" r="1.6"/><circle cx="12" cy="8" r="1.6"/><path d="M4 4.8v6.4"/><path d="M5.4 8H10.4"/></svg>
          <span class="nav-label">Workflow</span>
        </a>
        <a class="nav-item" data-route="settings" href="#/settings">
          <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.6v1.6M8 12.8v1.6M14.4 8h-1.6M3.2 8H1.6M12.3 3.7l-1.1 1.1M4.8 11.2l-1.1 1.1M12.3 12.3l-1.1-1.1M4.8 4.8 3.7 3.7"/></svg>
          <span class="nav-label">Settings</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-text">Connecting&hellip;</span>
      </div>
    </aside>
    <main class="main">
      <div id="view" class="view"></div>
    </main>
  </div>
  <div id="toast-container" class="toast-container"></div>
  <div id="overlay-root"></div>
  <script src="/static/app.js" defer></script>
</body>
</html>
